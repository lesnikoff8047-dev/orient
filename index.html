<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Ориентирование FREE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  font-size:18px;
}

.top{
  background:#111827;
  padding:20px;
}

h2{
  margin:5px;
  color:#38bdf8;
  font-size:34px;
}

.progress{
  font-size:34px;
  margin-top:8px;
}

button{
  padding:40px;
  width:99%;
  margin-top:20px;
  border:none;
  border-radius:20px;
  background:#22c55e;
  color:white;
  font-size:46px;
  font-weight:bold;
}

video{
  width:99%;
  margin-top:12px;
  border-radius:12px;
  display:none;
}

.card{
  background:#111827;
  margin:12px auto;
  padding:18px;
  width:99%;
  border-radius:18px;
  text-align:left;
  font-size:32px;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.resetBtn{
  position:fixed;
  top:20px;
  left:20px;
  width:80px;
  height:80px;
  border:none;
  border-radius:14px;
  background:#ef4444;
  color:white;
  font-size:30px;
  z-index:9999;
}

.modalBg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.modal{
  background:#111827;
  padding:20px;
  border-radius:14px;
  width:80%;
  max-width:300px;
}

.modal button{
  width:100%;
  margin-top:10px;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

.btnYes{background:#ef4444;color:white;}
.btnNo{background:#374151;color:white;}
</style>
</head>

<body>

<button class="resetBtn" onclick="openModal()">🧹</button>

<div class="modalBg" id="modalBg">
  <div class="modal">
    <div>⚠️ Сбросить все КП?</div>
    <button class="btnYes" onclick="resetCP()">ДА</button>
    <button class="btnNo" onclick="closeModal()">НЕТ</button>
  </div>
</div>

<div class="top">
  <h2>🏁 ОРИЕНТИРОВАНИЕ</h2>
  <div class="progress" id="progress">0 КП</div>
  <div id="athleteInfo"></div>
  <div id="netStatus"></div>
</div>

<button onclick="startScan()">📷 СКАН КП</button>

<video id="video" autoplay playsinline></video>

<div id="log"></div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxPb7oesDI3zk7zZFQNENB2wBCHeAr-RnK-6w9Xf2NQ0ZggpliVHEx9G6SABTTyPsYw/exec";

let athleteId = prompt("Номер спортсмена:");
let visited = new Set(JSON.parse(localStorage.getItem("visited") || "[]"));
let scanning = false;

function saveVisited(){
  localStorage.setItem("visited", JSON.stringify([...visited]));
}

function updateUI(){
  document.getElementById("progress").innerText = visited.size + " КП";
  document.getElementById("athleteInfo").innerText = "👤 Спортсмен: " + athleteId;
  document.getElementById("netStatus").innerText = navigator.onLine ? "🟢 ОНЛАЙН" : "🔴 ОФФЛАЙН";
}

window.addEventListener("online", updateUI);
window.addEventListener("offline", updateUI);

function send(cp, status){

  fetch(URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      athlete:athleteId,
      cp:cp,
      status:status,
      time:new Date().toISOString()
    })
  })
  .then(r=>r.text())
  .then(res=>console.log("SERVER:",res))
  .catch(err=>console.log("ERROR:",err));
}

function startScan(){

  if(scanning) return;

  const video = document.getElementById("video");
  video.style.display = "block";
  scanning = true;

  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(stream=>{

    video.srcObject = stream;

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    function scan(){

      if(!scanning) return;

      if(video.readyState === video.HAVE_ENOUGH_DATA){

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video,0,0);

        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(img.data,canvas.width,canvas.height);

        if(code){

          scanning = false;

          let cp = code.data.trim();

          if(!visited.has(cp)){
            visited.add(cp);
            saveVisited();
            send(cp,"OK");
            addLog(cp,true);
          } else {
            addLog(cp,false,"Уже был");
          }

          updateUI();

          stream.getTracks().forEach(t=>t.stop());
          video.style.display = "none";

          return;
        }
      }

      requestAnimationFrame(scan);
    }

    scan();

  });
}

function addLog(cp,ok,msg){

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML = `
    <b class="${ok ? 'green' : 'red'}">КП: ${cp}</b><br>
    ${msg || (ok ? "✔ Пройден" : "❌")}
  `;

  document.getElementById("log").prepend(div);
}

function openModal(){
  document.getElementById("modalBg").style.display="flex";
}

function closeModal(){
  document.getElementById("modalBg").style.display="none";
}

function resetCP(){
  visited.clear();
  localStorage.removeItem("visited");
  document.getElementById("log").innerHTML="";
  updateUI();
  closeModal();
}

window.onload = updateUI;

</script>

</body>
</html>
