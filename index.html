<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ориентирование QR</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #121212;
  color: white;
  font-family: Arial;
}

#app {
  max-width: 500px;
  margin: auto;
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
}

h2 { text-align: center; }

input {
  padding: 14px;
  width: 90%;
  font-size: 18px;
  border-radius: 8px;
  border: none;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 12px;
}

.start-btn {
  background: #2196f3;
  color: white;
  font-size: 20px;
  padding: 18px;
  width: 100%;
  margin-top: 15px;
  font-weight: bold;
}

.scan-btn {
  background: #00c853;
  color: white;
  font-size: 22px;
  padding: 20px;
  width: 100%;
  margin: 20px 0;
  font-weight: bold;
}

.cp {
  padding: 10px;
  margin: 6px 0;
  background: #2a2a2a;
  border-radius: 8px;
}

#reader {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
}
</style>
</head>

<body>

<div id="app">

<h2>🏁 Ориентирование QR</h2>

<div id="login">
  <p>Номер спортсмена:</p>
  <input id="athleteId" type="text" placeholder="101">
  <button class="start-btn" onclick="start()">Начать</button>
</div>

<div id="main" style="display:none;">
  <h3>Спортсмен: <span id="athlete"></span></h3>

  <button class="scan-btn" onclick="startScan()">СКАНИРОВАТЬ КП</button>

  <div id="reader" style="display:none;"></div>

  <h3>КП:</h3>
  <div id="list"></div>
</div>

</div>

<script>

// 🧠 уникальный ID устройства
let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

// 📌 база: номер → устройство
let athleteRegistry = JSON.parse(localStorage.getItem("athlete_registry") || "{}");

let athlete = "";
let checkpoints = [];

// ---------------- START ----------------
function start() {
  athlete = document.getElementById("athleteId").value;
  if (!athlete) return alert("Введите номер");

  // ❌ если номер уже используется другим устройством
  if (athleteRegistry[athlete] && athleteRegistry[athlete] !== deviceId) {
    alert("❌ Этот номер уже используется другим спортсменом");
    return;
  }

  // 🟢 закрепляем номер
  athleteRegistry[athlete] = deviceId;
  localStorage.setItem("athlete_registry", JSON.stringify(athleteRegistry));

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("athlete").innerText = athlete;

  loadData();
  render();
}

// ---------------- SCAN ----------------
function startScan() {
  document.getElementById("reader").style.display = "block";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      qr.stop();
      document.getElementById("reader").style.display = "none";

      registerCP(text.trim());
    }
  );
}

// ---------------- CP ----------------
function registerCP(cp) {
  const time = new Date().toLocaleTimeString();

  checkpoints.push({ cp, time });

  saveData();
  render();
}

// ---------------- RENDER ----------------
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  checkpoints.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "cp";
    div.innerText = `${i + 1}. КП ${item.cp} (${item.time})`;
    list.appendChild(div);
  });
}

// ---------------- STORAGE ----------------
function saveData() {
  localStorage.setItem("cp_" + athlete, JSON.stringify(checkpoints));
}

function loadData() {
  const data = localStorage.getItem("cp_" + athlete);
  if (data) checkpoints = JSON.parse(data);
}

</script>

</body>
</html>
