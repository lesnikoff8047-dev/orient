<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Ориентирование QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #121212;
      color: white;
      font-family: Arial;
    }

    #app {
      max-width: 500px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
    }

    input {
      padding: 14px;
      width: 90%;
      font-size: 18px;
      border-radius: 8px;
      border: none;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
    }

    .start-btn {
      background: #2196f3;
      color: white;
      font-size: 20px;
      padding: 18px;
      width: 100%;
      margin-top: 15px;
      font-weight: bold;
    }

    .scan-btn {
      background: #00c853;
      color: white;
      font-size: 22px;
      padding: 20px;
      width: 100%;
      margin: 20px 0;
      font-weight: bold;
    }

    .cp {
      padding: 10px;
      margin: 6px 0;
      background: #2a2a2a;
      border-radius: 8px;
    }

    #reader {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div id="app">

  <h2>🏁 Ориентирование QR</h2>

  <div id="login">
    <p>Номер спортсмена:</p>
    <input id="athleteId" type="text" placeholder="101">
    <button class="start-btn" onclick="start()">Начать</button>
  </div>

  <div id="main" style="display:none;">
    <h3>Спортсмен: <span id="athlete"></span></h3>

    <button class="scan-btn" onclick="startScan()">СКАНИРОВАТЬ КП</button>

    <div id="reader" style="display:none;"></div>

    <h3>КП:</h3>
    <div id="list"></div>
  </div>

</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxQlJjaa7dieWA2K04P5KztZ3RWr_-iPrXWDxUNbS3F6WhDyqigzy7K788DGLqba9pp/exec";

let athlete = "";
let checkpoints = [];
let queue = [];

function start() {
  athlete = document.getElementById("athleteId").value;
  if (!athlete) return alert("Введите номер");

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("athlete").innerText = athlete;

  loadData();
  loadQueue();
  render();
  trySync();
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      qr.stop();
      document.getElementById("reader").style.display = "none";
      registerCP(text);
    }
  );
}

function registerCP(cp) {
  const time = new Date().toLocaleTimeString();

  const exists = checkpoints.some(i => i.cp === cp);

  const record = {
    athlete,
    cp,
    time,
    type: exists ? "repeat" : "ok"
  };

  checkpoints.push(record);
  queue.push(record);

  saveData();
  saveQueue();
  render();

  trySync();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  checkpoints.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "cp";

    if (item.type === "repeat") {
      div.style.color = "red";
      div.innerText = `${i+1}. ❌ ${item.cp} (${item.time})`;
    } else {
      div.style.color = "#00c853";
      div.innerText = `${i+1}. ✔ ${item.cp} (${item.time})`;
    }

    list.appendChild(div);
  });
}

function sendToSheet(data) {
  return fetch(SHEET_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
}

function trySync() {
  if (!navigator.onLine) return;

  const copy = [...queue];

  copy.forEach(async (item) => {
    await sendToSheet(item);
  });

  queue = [];
  saveQueue();
}

window.addEventListener("online", trySync);

function saveData() {
  localStorage.setItem("cp_" + athlete, JSON.stringify(checkpoints));
}

function loadData() {
  const data = localStorage.getItem("cp_" + athlete);
  if (data) checkpoints = JSON.parse(data);
}

function saveQueue() {
  localStorage.setItem("queue_" + athlete, JSON.stringify(queue));
}

function loadQueue() {
  const data = localStorage.getItem("queue_" + athlete);
  if (data) queue = JSON.parse(data);
}
</script>

</body>
</html>
