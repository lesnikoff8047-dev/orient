<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ориентирование QR</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #121212;
  color: white;
  font-family: Arial;
}

#app {
  max-width: 500px;
  margin: auto;
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
}

h2 { text-align: center; }

input {
  padding: 14px;
  width: 90%;
  font-size: 18px;
  border-radius: 8px;
  border: none;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 12px;
}

.start-btn {
  background: #2196f3;
  color: white;
  font-size: 20px;
  padding: 18px;
  width: 100%;
  margin-top: 15px;
  font-weight: bold;
}

.scan-btn {
  background: #00c853;
  color: white;
  font-size: 22px;
  padding: 20px;
  width: 100%;
  margin: 20px 0;
  font-weight: bold;
}

.danger-btn {
  background: #d32f2f;
  color: white;
  font-size: 14px;
  padding: 10px;
  width: 60%;
  margin: 10px auto 0;
  display: block;
  border-radius: 10px;
  font-weight: bold;
}

.cp {
  padding: 10px;
  margin: 6px 0;
  background: #2a2a2a;
  border-radius: 8px;
}

#reader {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="app">

<h2>🏁 Ориентирование QR</h2>

<div id="login">
  <p>Номер спортсмена:</p>
  <input id="athleteId" type="text" placeholder="101">
  <button class="start-btn" onclick="start()">Начать</button>
</div>

<div id="main" style="display:none;">
  <h3>Спортсмен: <span id="athlete"></span></h3>

  <button class="scan-btn" onclick="startScan()">СКАНИРОВАТЬ КП</button>

  <button class="danger-btn" onclick="resetData()">⚠ ОЧИСТИТЬ КП</button>

  <div id="reader" style="display:none;"></div>

  <h3>КП:</h3>
  <div id="list"></div>
</div>

</div>

<script>

// 🔐 устройство
let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

let athleteRegistry = JSON.parse(localStorage.getItem("athlete_registry") || "{}");

const SHEET_URL = "https://script.google.com/macros/s/AKfycbxQlJjaa7dieWA2K04P5KztZ3RWr_-iPrXWDxUNbS3F6WhDyqigzy7K788DGLqba9pp/exec";

let athlete = "";
let checkpoints = [];
let queue = [];
let raceFinished = false;
let finishTime = null;

// ---------- START ----------
function start() {
  athlete = document.getElementById("athleteId").value;
  if (!athlete) return alert("Введите номер");

  if (athleteRegistry[athlete] && athleteRegistry[athlete] !== deviceId) {
    alert("❌ Этот номер уже используется другим спортсменом");
    return;
  }

  athleteRegistry[athlete] = deviceId;
  localStorage.setItem("athlete_registry", JSON.stringify(athleteRegistry));

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("athlete").innerText = athlete;

  loadData();
  loadQueue();

  raceFinished = localStorage.getItem("raceFinished_" + athlete) === "1";
  finishTime = Number(localStorage.getItem("finishTime_" + athlete)) || null;

  render();
  trySync();
}

// ---------- SCAN ----------
function startScan() {

  document.getElementById("reader").style.display = "block";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      qr.stop();
      document.getElementById("reader").style.display = "none";

      const code = text.trim();

      // 🏁 финиш
      if (code === "100") {
        finishRace();
        return;
      }

      // 🧹 мгновенная очистка
      if (code.toUpperCase() === "ОЧИСТКА") {
        const ok = confirm("⚠ Очистить все данные?");
        if (!ok) return;
        forceReset();
        return;
      }

      registerCP(code);
    }
  );
}

// ---------- КП ----------
function registerCP(cp) {

  const time = new Date().toLocaleTimeString();

  const isRepeat = checkpoints.some(item => item.cp === cp);

  checkpoints.push({
    athlete,
    cp,
    time,
    type: isRepeat ? "repeat" : "ok"
  });

  queue.push({ athlete, cp, time });

  saveData();
  saveQueue();
  render();
  trySync();
}

// ---------- ФИНИШ ----------
function finishRace() {

  raceFinished = true;
  finishTime = Date.now();

  localStorage.setItem("raceFinished_" + athlete, "1");
  localStorage.setItem("finishTime_" + athlete, finishTime);

  checkpoints.push({
    athlete,
    cp: "FINISH",
    time: new Date().toLocaleTimeString(),
    type: "finish"
  });

  saveData();
  render();

  alert("🏁 ФИНИШ!");
}

// ---------- МГНОВЕННАЯ ОЧИСТКА ----------
function forceReset() {

  checkpoints = [];
  queue = [];
  raceFinished = false;
  finishTime = null;

  localStorage.removeItem("cp_" + athlete);
  localStorage.removeItem("queue_" + athlete);
  localStorage.removeItem("raceFinished_" + athlete);
  localStorage.removeItem("finishTime_" + athlete);

  render();

  alert("🧹 Очищено");
}

// ---------- КНОПКА ОЧИСТКИ ----------
function resetData() {

  if (checkpoints.length > 0 && !raceFinished) {
    alert("⛔ Нельзя очищать после старта!");
    return;
  }

  if (raceFinished) {
    const diff = Date.now() - finishTime;
    const minutes = diff / 1000 / 60;

    if (minutes < 2) {
      alert(`⏳ Очистка доступна через ${Math.ceil(2 - minutes)} мин`);
      return;
    }
  }

  const ok = confirm("Удалить данные?");
  if (!ok) return;

  forceReset();
}

// ---------- RENDER ----------
function render() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  checkpoints.forEach((item, i) => {

    const div = document.createElement("div");
    div.className = "cp";

    if (item.type === "repeat") {
      div.style.color = "red";
      div.innerText = `${i+1}. ❌ КП ${item.cp} (${item.time})`;
    }
    else if (item.type === "finish") {
      div.style.color = "#ff5252";
      div.innerText = `${i+1}. 🏁 ФИНИШ (${item.time})`;
    }
    else {
      div.style.color = "#00c853";
      div.innerText = `${i+1}. ✔ КП ${item.cp} (${item.time})`;
    }

    list.appendChild(div);
  });
}

// ---------- STORAGE ----------
function saveData() {
  localStorage.setItem("cp_" + athlete, JSON.stringify(checkpoints));
}

function loadData() {
  const data = localStorage.getItem("cp_" + athlete);
  if (data) checkpoints = JSON.parse(data);
}

function saveQueue() {
  localStorage.setItem("queue_" + athlete, JSON.stringify(queue));
}

function loadQueue() {
  const data = localStorage.getItem("queue_" + athlete);
  if (data) queue = JSON.parse(data);
}

function sendToSheet(data) {
  return fetch(SHEET_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
}

function trySync() {
  if (!navigator.onLine) return;

  queue.forEach(async (item) => {
    await sendToSheet(item);
  });

  queue = [];
  saveQueue();
}

window.addEventListener("online", trySync);

</script>

</body>
</html>
