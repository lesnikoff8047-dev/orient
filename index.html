<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Ориентирование LIVE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.top{
  background:#111827;
  padding:20px;
}

h2{color:#38bdf8;margin:5px;}

.progress{
  font-size:32px;
  margin-top:10px;
}

button{
  padding:40px;
  width:98%;
  margin-top:20px;
  font-size:40px;
  border:none;
  border-radius:20px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

video{
  width:98%;
  margin-top:10px;
  display:none;
  border-radius:12px;
}

.card{
  background:#111827;
  margin:10px;
  padding:15px;
  border-radius:15px;
  font-size:24px;
}
</style>
</head>

<body>

<div class="top">
  <h2>🏁 ОРИЕНТИРОВАНИЕ LIVE</h2>
  <div class="progress" id="progress">0 КП</div>
  <div id="athleteInfo"></div>
</div>

<button onclick="startScan()">📷 СКАН КП</button>

<video id="video" autoplay playsinline></video>

<div id="log"></div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxPb7oesDI3zk7zZFQNENB2wBCHeAr-RnK-6w9Xf2NQ0ZggpliVHEx9G6SABTTyPsYw/exec";

let athleteId = prompt("Номер спортсмена:");
let visited = new Set(JSON.parse(localStorage.getItem("visited") || "[]"));
let scanning = false;

function updateUI(){
  document.getElementById("progress").innerText = visited.size + " КП";
  document.getElementById("athleteInfo").innerText = "👤 " + athleteId;
}

function save(){
  localStorage.setItem("visited", JSON.stringify([...visited]));
}

function send(cp, status){

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      athlete: athleteId,
      cp: cp,
      status: status,
      time: new Date().toISOString()
    })
  })
  .then(r => r.json())
  .then(res => console.log("API RESPONSE:", res))
  .catch(err => console.log("ERROR:", err));

}

function startScan(){

  if(scanning) return;

  const video = document.getElementById("video");
  video.style.display = "block";
  scanning = true;

  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(stream=>{

    video.srcObject = stream;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    function scan(){

      if(!scanning) return;

      if(video.readyState === video.HAVE_ENOUGH_DATA){

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video,0,0);

        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(img.data, canvas.width, canvas.height);

        if(code){

          let cp = code.data.trim();

          scanning = false;

          if(!visited.has(cp)){
            visited.add(cp);
            save();
            send(cp,"OK");
            addLog(cp,true);
          } else {
            addLog(cp,false,"уже был");
          }

          updateUI();

          stream.getTracks().forEach(t=>t.stop());
          video.style.display = "none";
          return;
        }
      }

      requestAnimationFrame(scan);
    }

    scan();

  });

}

function addLog(cp, ok, msg){

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <b>${cp}</b><br>
    ${msg || (ok ? "✔ OK" : "❌")}
  `;

  document.getElementById("log").prepend(div);
}

window.onload = updateUI;

</script>

</body>
</html>
