<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Ориентирование QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #121212;
      color: white;
      font-family: Arial;
    }

    #app {
      max-width: 500px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
      margin: 10px 0 25px;
    }

    input {
      padding: 14px;
      width: 90%;
      border-radius: 8px;
      border: none;
      font-size: 18px;
      margin-top: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
    }

    .start-btn {
      background: #2196f3;
      color: white;
      font-size: 20px;
      padding: 18px 30px;
      margin-top: 15px;
      width: 100%;
      font-weight: bold;
    }

    .scan-btn {
      background: #00c853;
      color: white;
      font-size: 22px;
      padding: 20px 30px;
      margin: 20px 0;
      width: 100%;
      font-weight: bold;
    }

    .cp {
      padding: 10px;
      margin: 6px 0;
      background: #2a2a2a;
      border-radius: 8px;
    }

    #reader {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div id="app">

  <h2>🏁 Ориентирование QR</h2>

  <div id="login">
    <p>Введите номер спортсмена:</p>
    <input id="athleteId" type="text" placeholder="Например 101">
    <br>
    <button class="start-btn" onclick="start()">Начать</button>
  </div>

  <div id="main" style="display:none;">
    <h3>Спортсмен: <span id="athlete"></span></h3>

    <button class="scan-btn" onclick="startScan()">
      СКАНИРОВАТЬ КП
    </button>

    <div id="reader" style="display:none;"></div>

    <h3>Пройденные КП:</h3>
    <div id="list"></div>
  </div>

</div>

<script>
let athlete = "";
let checkpoints = [];

function start() {
  athlete = document.getElementById("athleteId").value;
  if (!athlete) {
    alert("Введите номер!");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("athlete").innerText = athlete;

  loadData();
  render();
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      qr.stop();
      document.getElementById("reader").style.display = "none";
      registerCP(decodedText);
    }
  );
}

function registerCP(cp) {
  const time = new Date().toLocaleTimeString();

  const exists = checkpoints.some(item => item.cp === cp);

  if (exists) {
    checkpoints.push({ cp: cp, type: "repeat", time: time });
  } else {
    checkpoints.push({ cp: cp, type: "ok", time: time });
  }

  saveData();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  checkpoints.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "cp";

    if (item.type === "repeat") {
      div.style.color = "red";
      div.style.borderLeft = "4px solid red";
      div.innerText = (i + 1) + ". ❌ Повтор КП: " + item.cp;
    } else {
      div.style.color = "#00c853";
      div.style.borderLeft = "4px solid #00c853";
      div.innerText = (i + 1) + ". ✔ КП: " + item.cp;
    }

    list.appendChild(div);
  });
}

function saveData() {
  localStorage.setItem("cp_" + athlete, JSON.stringify(checkpoints));
}

function loadData() {
  const data = localStorage.getItem("cp_" + athlete);
  if (data) checkpoints = JSON.parse(data);
}
</script>

</body>
</html>
