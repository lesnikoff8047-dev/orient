<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ориентирование QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #121212; /* тёмный фон */
      color: #ffffff;
    }

    #app {
      max-width: 500px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 6px;
      border: none;
      margin-top: 10px;
    }

    /* 🔥 БОЛЬШАЯ ЗЕЛЁНАЯ КНОПКА */
    .scan-btn {
      background: #00c853;
      color: white;
      font-size: 22px;
      padding: 60px 70px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      margin: 20px 0;
      width: 100%;
      font-weight: bold;
      box-shadow: 0 6px 0 #009624;
      transition: 0.1s;
    }

    .scan-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #009624;
    }

    .cp {
      padding: 10px;
      margin: 6px 0;
      background: #2a2a2a;
      border-radius: 8px;
    }

    #reader {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div id="app">

  <h2>🏁 Ориентирование QR</h2>

  <div id="login">
    <p>Введите номер спортсмена:</p>
    <input id="athleteId" type="text" placeholder="Например 101">
    <br>
    <button onclick="start()">Начать</button>
  </div>

  <div id="main" style="display:none;">
    <h3>Спортсмен: <span id="athlete"></span></h3>

    <!-- 🔥 большая зелёная кнопка -->
    <button class="scan-btn" onclick="startScan()">
      СКАНИРОВАТЬ КП
    </button>

    <div id="reader" style="display:none;"></div>

    <h3>Пройденные КП:</h3>
    <div id="list"></div>
  </div>

</div>

<script>
let athlete = "";
let checkpoints = [];

function start() {
  athlete = document.getElementById("athleteId").value;
  if (!athlete) {
    alert("Введите номер!");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("athlete").innerText = athlete;

  loadData();
  render();
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      qr.stop();
      document.getElementById("reader").style.display = "none";
      registerCP(decodedText);
    }
  );
}

function registerCP(cp) {
  const time = new Date().toLocaleTimeString();

  if (checkpoints.includes(cp)) {
    alert("КП уже пройдено!");
    return;
  }

  checkpoints.push(cp);

  saveData();
  render();

  alert("КП засчитано: " + cp + " (" + time + ")");
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  checkpoints.forEach((cp, i) => {
    const div = document.createElement("div");
    div.className = "cp";
    div.innerText = (i + 1) + ". " + cp;
    list.appendChild(div);
  });
}

function saveData() {
  localStorage.setItem("cp_" + athlete, JSON.stringify(checkpoints));
}

function loadData() {
  const data = localStorage.getItem("cp_" + athlete);
  if (data) checkpoints = JSON.parse(data);
}
</script>

</body>
</html>
