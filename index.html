<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ориентирование QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    #app {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #reader {
      width: 100%;
      margin-top: 10px;
    }

    .cp {
      padding: 8px;
      margin: 5px;
      background: #e3f2fd;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div id="app">
  <h2>Спортивное ориентирование (QR)</h2>

  <div id="login">
    <p>Введите номер спортсмена:</p>
    <input id="athleteId" type="text" placeholder="Например 101">
    <br>
    <button onclick="start()">Начать</button>
  </div>

  <div id="main" style="display:none;">
    <h3>Спортсмен: <span id="athlete"></span></h3>

    <button onclick="startScan()">Сканировать КП</button>

    <div id="reader" style="display:none;"></div>

    <h3>Пройденные КП:</h3>
    <div id="list"></div>
  </div>
</div>

<script>
let athlete = "";
let checkpoints = [];

function start() {
  athlete = document.getElementById("athleteId").value;
  if (!athlete) {
    alert("Введите номер!");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("athlete").innerText = athlete;

  loadData();
  render();
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      qr.stop();

      document.getElementById("reader").style.display = "none";

      registerCP(decodedText);
    }
  );
}

function registerCP(cp) {
  const time = new Date().toLocaleTimeString();

  if (checkpoints.includes(cp)) {
    alert("КП уже пройдено!");
    return;
  }

  checkpoints.push(cp);

  saveData();
  render();

  alert("КП засчитано: " + cp + " (" + time + ")");
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  checkpoints.forEach((cp, i) => {
    const div = document.createElement("div");
    div.className = "cp";
    div.innerText = (i + 1) + ". " + cp;
    list.appendChild(div);
  });
}

function saveData() {
  localStorage.setItem("cp_" + athlete, JSON.stringify(checkpoints));
}

function loadData() {
  const data = localStorage.getItem("cp_" + athlete);
  if (data) {
    checkpoints = JSON.parse(data);
  }
}
</script>

</body>
</html>
